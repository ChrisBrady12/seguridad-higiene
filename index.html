<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000d0e">

<title>Seguridad e Higiene</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

/* bloquear selección */
body{
user-select:none;
-webkit-user-select:none;
-moz-user-select:none;
}

/* evitar arrastrar imágenes */
img{
pointer-events:none;
}

:root{
--primary:#ffffff;
--bg:#00357a;
--text:#ffffff;
}

body{

font-family:'Montserrat',sans-serif;
background:var(--bg);
color:white;

min-height:10vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;
padding:25px;
}

/* logo */

.logo{
width:140px;
margin-bottom:18px;
}

/* linea superior */

.top-line{

width:100%;
max-width:420px;
height:3px;

background:linear-gradient(90deg,#ffffff,#00357a);

border-radius:20px;

margin-bottom:25px;
}

/* textos */

h1{

color:var(--text);
font-weight:700;
font-size:24px;
letter-spacing:1px;
margin-bottom:6px;

}

h2{

color:var(--primary);
font-size:18px;
font-weight:600;
margin-top:15px;

}

/* contenedor video */

.video-preview{
position:relative;
width:100%;
max-width:420px;
margin:25px 0 5px 0;
}

/* imagen previa */

.video-preview img{
width:100%;
border-radius:14px;
display:block;
}

/* boton play */

.play-button{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70px;
height:70px;

border-radius:50%;
border:none;

background:rgba(0,0,0,0.65);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

.play-button svg{

fill:white;
width:32px;
height:32px;

}

/* video */

video{

display:none;
width:100%;
border-radius:14px;
background:black;

}

/* imagen inferior */

.receta{
margin-top:0px;
max-width:420px;
width:250px;
}

/* lineas inferiores */

.color-strip{

display:flex;
gap:6px;
justify-content:center;

margin-top:20px;

width:100%;
max-width:420px;

}

.color-strip span{

height:3px;
border-radius:999px;

flex:1;

}

.cs1{background:#ff7b00;}
.cs2{background:#009da3;}
.cs3{background:#f70083;}
.cs4{background:#ffd92a;}

</style>
</head>

<body oncontextmenu="return false">

<img src="izzi.png" class="logo">

<div class="top-line"></div>

<h1>SEGURIDAD E HIGIENE</h1>

<h2>POR FAVOR OBSERVE EL VIDEO</h2>

<div class="video-preview">

<img src="RT1.png" id="previewImg1">

<button class="play-button" onclick="playVideo()">

<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>

</button>

<video 
id="video1" 
src="RT1.mp4" 
controls
controlsList="nodownload noplaybackrate"
disablePictureInPicture
oncontextmenu="return false">
</video>

</div>

<img src="2.png" alt="imagen" class="receta">

<div class="color-strip">
<span class="cs1"></span>
<span class="cs2"></span>
<span class="cs3"></span>
<span class="cs4"></span>
</div>

<script>

/* bloquear clic derecho */
document.addEventListener("contextmenu", e => e.preventDefault());

/* bloquear teclas comunes */
document.addEventListener("keydown", function(e){

if(
e.key === "F12" ||
(e.ctrlKey && e.key === "u") ||
(e.ctrlKey && e.key === "s") ||
(e.ctrlKey && e.key === "c") ||
(e.ctrlKey && e.key === "x")
){
e.preventDefault();
}

});

function playVideo(){

const video=document.getElementById("video1");
const img=document.getElementById("previewImg1");
const btn=document.querySelector(".play-button");

img.style.display="none";
btn.style.display="none";
video.style.display="block";

video.play();

}

/* CAMBIO AUTOMATICO DE VIDEO CADA LUNES */

const inicio = new Date("2026-03-30");
const hoy = new Date();

const diferencia = hoy - inicio;

const semana = Math.floor(diferencia / (1000*60*60*24*7));

const lista = [
{video:"RT1.mp4", img:"RT1.png"},
{video:"RT2.mp4", img:"RT2.png"},
{video:"RT3.mp4", img:"RT3.png"},
{video:"RT4.mp4", img:"RT4.png"},
{video:"RT5.mp4", img:"RT5.png"}
];

let index = 0;

if(semana >= 0){
index = semana;
}

if(index >= lista.length){
index = lista.length - 1;
}

document.getElementById("video1").src = lista[index].video;
document.getElementById("previewImg1").src = lista[index].img;

</script>

</body>
</html>
