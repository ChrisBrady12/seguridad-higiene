<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#000d0e">

<title>Seguridad e Higiene</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

:root{
--primary:#ffffff;
--bg:linear-gradient(135deg,#00357a,#004aad,#00265a);
--text:#ffffff;
--otro:#c1c1c1;
--video:#ff7b00;
}

body{

font-family:'Montserrat',sans-serif;
background:var(--bg);
color:white;

min-height:10vh;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

text-align:center;
padding:25px;
}

/* logo */

.logo{
width:140px;
margin-bottom:18px;
}

/* linea superior */

.top-line{

width:100%;
max-width:420px;
height:3px;

background:linear-gradient(90deg,#ffffff,#00357a);

border-radius:20px;

margin-bottom:25px;
}

/* textos */

h1{

color:var(--text);
font-weight:700;
font-size:25px;
letter-spacing:1px;
margin-bottom:4px;

}

h2{

color:var(--otro);
font-size:19px;
font-weight:600;
margin-top:40px;

}

h3{

color:var(--video);
font-size:21px;
font-weight:800;
margin-top:20px;

}

/* contenedor video */

.video-preview{
position:relative;
width:100%;
max-width:420px;
margin:25px 0 5px 0;
}

/* imagen previa */

.video-preview img{
width:100%;
border-radius:14px;
margin-top:-5px;
cursor:pointer;
}

/* boton play */

.play-button{

position:absolute;
top:50%;
left:50%;

transform:translate(-50%,-50%);

width:70px;
height:70px;

border-radius:50%;
border:none;

background:rgba(0,0,0,0.65);

display:flex;
align-items:center;
justify-content:center;

cursor:pointer;

}

.play-button svg{

fill:white;
width:32px;
height:32px;

}

/* video */

video{

display:none;
width:100%;
border-radius:14px;
background:black;
margin-top:-5px;

}

/* imagen inferior */

.receta{
margin-top:20px;
max-width:420px;
width:170px;
}

/* lineas inferiores */

.color-strip{

display:flex;
gap:6px;
justify-content:center;

margin-top:50px;

width:100%;
max-width:420px;

}

.color-strip span{

height:3px;
border-radius:999px;

flex:1;

}

.cs1{background:#ff7b00;}
.cs2{background:#009da3;}
.cs3{background:#f70083;}
.cs4{background:#ffd92a;}

</style>
</head>

<body oncontextmenu="return false">

<img src="izzi.png" class="logo">

<div class="top-line"></div>

<h1>SEGURIDAD E HIGIENE</h1>
<img src="2.png" alt="imagen" class="receta">
<h2>POR FAVOR OBSERVE EL VIDEO</h2>
<h3 id="videoTitulo">BANDOLA DE SEGURIDAD</h3>

<div class="video-preview">

<img src="RT1.png" id="previewImg1" onclick="playVideo()" draggable="false">

<button class="play-button" onclick="playVideo()">

<svg viewBox="0 0 24 24">
<path d="M8 5v14l11-7z"/>
</svg>

</button>

<video 
id="video1" 
src="MF1.mp4" 
controls 
controlsList="nodownload noplaybackrate"
disablePictureInPicture
></video>

</div>



<div class="color-strip">
<span class="cs1"></span>
<span class="cs2"></span>
<span class="cs3"></span>
<span class="cs4"></span>

<script>

function playVideo(){

const video=document.getElementById("video1");
const img=document.getElementById("previewImg1");
const btn=document.querySelector(".play-button");

img.style.display="none";
btn.style.display="none";
video.style.display="block";

video.play();

}

/* CAMBIO AUTOMATICO DE VIDEO CADA MARTES */

const inicio = new Date("2026-03-31");
inicio.setHours(0,0,0,0);

const hoy = new Date();
hoy.setHours(0,0,0,0);

const diferencia = hoy - inicio;

const semana = Math.floor(diferencia / (1000 * 60 * 60 * 24 * 7));

const lista = [
{video:"RT1.mp4", img:"RT1.png", titulo:"BANDOLA DE SEGURIDAD"},
{video:"RT2.mp4", img:"RT2.png", titulo:"BOTAS DE SEGURIDAD"},
{video:"RT3.mp4", img:"RT3.png", titulo:"CASCO DE SEGURIDAD"},
{video:"RT4.mp4", img:"RT4.png", titulo:"GAFAS DE SEGURIDAD"},
{video:"RT5.mp4", img:"RT5.png", titulo:"RESPIRACION CONSCIENTE"},
];

let index = 0;

if(semana >= 0){
index = semana;
}

if(index >= lista.length){
index = lista.length - 1;
}

document.getElementById("video1").src = lista[index].video;
document.getElementById("previewImg1").src = lista[index].img;
document.getElementById("videoTitulo").textContent = lista[index].titulo;

/* BLOQUEAR CLICK DERECHO */

document.addEventListener("contextmenu",function(e){
e.preventDefault();
});

/* BLOQUEAR ARRASTRAR IMAGENES Y VIDEO */

document.addEventListener("dragstart",function(e){
e.preventDefault();
});

</script>

</body>
</html>
